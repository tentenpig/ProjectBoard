services:
  server:
    build: ./server
    container_name: projectboard-server
    ports:
      - "3001:3001"
    environment:
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      PORT: 3001
    volumes:
      - ./server/src:/app/src

  client:
    build: ./client
    container_name: projectboard-client
    ports:
      - "5173:5173"
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src
